name: Build Poco F6 Mutan Kernels (Extreme Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Mutan Extreme Kernel
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # [1] CHECKOUT KERNEL SOURCE (BYPASS BROKEN SUBMODULES)
      # =========================================================
      - name: Checkout Mutan Source
        uses: actions/checkout@v4
        with:
          repository: 'harunaltair/Realking_kernel_peridot_mutan'
          ref: 'main'
          fetch-depth: 1
          # Submodules dimatikan secara eksplisit untuk stabilitas CI/CD
          submodules: false

      # =========================================================
      # [2] CACHE TOOLCHAIN (UPGRADED TO CLANG 23)
      # =========================================================
      - name: Cache Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          # Key baru untuk memaksa sistem mengunduh Clang 23
          key: clang-23.0.0git-20260130

      # =========================================================
      # [3] INSTALL BUILD DEPENDENCIES
      # =========================================================
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential flex git-core gnupg gperf \
            libssl-dev libxml2-utils lzop python3 python-is-python3 \
            zip zlib1g-dev llvm clang lld libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      # =========================================================
      # [4] SETUP TOOLCHAIN (BLEEDING EDGE)
      # =========================================================
      - name: Setup Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain && cd toolchain
          echo "Mengunduh ZyCromerZ Clang 23..."
          curl -L --retry 3 --retry-delay 5 \
            -o clang.tar.gz \
            "https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz"
          tar -xf clang.tar.gz
          rm -f clang.tar.gz

      - name: Verify Toolchain
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          echo "=== Clang Version ==="
          clang --version || { echo "❌ clang tidak ditemukan!"; exit 1; }
          echo "=== LLD Version ==="
          ld.lld --version || { echo "❌ ld.lld tidak ditemukan!"; exit 1; }
          echo "=== Cross GCC ==="
          aarch64-linux-gnu-gcc --version || { echo "❌ aarch64 gcc tidak ditemukan!"; exit 1; }
          echo "✅ Toolchain OK"

      - name: Add Toolchain to PATH
        run: echo "$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_PATH

      # =========================================================
      # [5] SETUP KERNELSU NEXT (RESILIENT MANUAL CLONE)
      # =========================================================
      - name: Setup KernelSU Next
        run: |
          set -e
          echo "Membersihkan jejak submodule KSU yang rusak..."
          rm -rf KernelSU-Next drivers/kernelsu drivers/kernelsu-next
          
          echo "Mengunduh KernelSU-Next secara manual..."
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next drivers/kernelsu
          
          if [ -d "drivers/kernelsu/kernel" ]; then
            mv drivers/kernelsu/kernel/* drivers/kernelsu/
            rm -rf drivers/kernelsu/kernel
          fi
          
          echo "✅ KernelSU Next siap digunakan."

      # =========================================================
      # [6] MUTAN EXTREME CONFIGURATION
      # =========================================================
      - name: Kernel Config Setup
        run: |
          set -e

          CONF="arch/arm64/configs/vendor/peridot_defconfig"
          [ ! -f "$CONF" ] && CONF="arch/arm64/configs/peridot_defconfig"
          [ ! -f "$CONF" ] && CONF=$(find arch/arm64/configs/ -name "*peridot*" | head -n 1)
          
          echo "TARGET_DEFCONFIG=$(basename $CONF)" >> $GITHUB_ENV
          DEFCONFIG="$CONF"
          echo "✅ Menggunakan defconfig: $DEFCONFIG"

          set_config() {
            sed -i "/^$1[= ]/d" "$DEFCONFIG" || true
            sed -i "/^# $1 is not set/d" "$DEFCONFIG" || true
            echo "$1=$2" >> "$DEFCONFIG"
          }

          echo "=== Applying Mutan Extreme Optimizations ==="

          # [A] COMPILATION & EXTREME OPTIMIZATION
          sed -i 's/CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y/CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y/g' "$DEFCONFIG" || true
          set_config CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3 y
          set_config CONFIG_FRAME_WARN 4096
          set_config CONFIG_WERROR n
          set_config CONFIG_LTO_CLANG_THIN y
          set_config CONFIG_HZ_300 y
          
          # Disable Heavy Tracing
          set_config CONFIG_FTRACE n
          set_config CONFIG_FUNCTION_TRACER n
          set_config CONFIG_TRACING y
          set_config CONFIG_TRACE_CLOCK y

          # [B] ROOT ACCESS
          set_config CONFIG_KSU y
          set_config CONFIG_KSU_NEXT y
          set_config CONFIG_OVERLAY_FS y
          set_config CONFIG_OVERLAY_FS_REDIRECT_DIR y
          set_config CONFIG_OVERLAY_FS_INDEX y

          # [C] SCHEDULER: EAS & SCHEDUTIL
          set_config CONFIG_CPU_FREQ_GOV_SCHEDUTIL y
          set_config CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL y
          set_config CONFIG_CPU_IDLE_GOV_TEO y
          set_config CONFIG_ENERGY_MODEL y
          set_config CONFIG_UCLAMP_TASK y
          set_config CONFIG_UCLAMP_TASK_GROUP y

          # [D] MEMORY MANAGEMENT
          set_config CONFIG_PSI y
          set_config CONFIG_MEMCG y
          set_config CONFIG_MEMCG_SWAP y
          set_config CONFIG_MEMCG_KMEM y
          set_config CONFIG_CGROUP_CPUACCT y
          set_config CONFIG_ZRAM y
          set_config CONFIG_ZSMALLOC y
          set_config CONFIG_ZSWAP y
          set_config CONFIG_ZRAM_DEF_COMP_LZ4 y
          set_config CONFIG_TRANSPARENT_HUGEPAGE y
          set_config CONFIG_TRANSPARENT_HUGEPAGE_MADVISE y

          # [E] I/O SCHEDULER
          set_config CONFIG_IOSCHED_BFQ y
          set_config CONFIG_BFQ_GROUP_IOSCHED y
          set_config CONFIG_DEFAULT_IOSCHED \"bfq\"
          set_config CONFIG_MQ_IOSCHED_KYBER y

          # [F] NETWORK
          set_config CONFIG_TCP_CONG_BBR y
          set_config CONFIG_DEFAULT_TCP_CONG \"bbr\"
          set_config CONFIG_NET_SCH_FQ y
          set_config CONFIG_NET_SCH_FQ_CODEL y
          set_config CONFIG_WIREGUARD y

          echo "✅ Semua config Mutan berhasil di-set"

      # =========================================================
      # [7] BUILD KERNEL
      # =========================================================
      - name: Build Kernel
        run: |
          set -e
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"

          rm -rf out && mkdir -p out

          DEFCONFIG_BASENAME=$(basename "$TARGET_DEFCONFIG")

          echo "========================================"
          echo " Step 1: Generate base config"
          echo "========================================"
          make O=out ARCH=arm64 "$DEFCONFIG_BASENAME"

          echo "========================================"
          echo " Step 2: oldconfig (non-interactive)"
          echo "========================================"
          yes "" | make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang oldconfig

          echo "========================================"
          echo " Step 3: Main compilation"
          echo "========================================"
          make -j$(nproc --all) O=out        \
            ARCH=arm64                        \
            LLVM=1                            \
            LLVM_IAS=1                        \
            CC=clang                          \
            CLANG_TRIPLE=aarch64-linux-gnu-   \
            CROSS_COMPILE=aarch64-linux-gnu-  \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld                         \
            AR=llvm-ar                        \
            NM=llvm-nm                        \
            OBJCOPY=llvm-objcopy              \
            OBJDUMP=llvm-objdump              \
            STRIP=llvm-strip                  \
            Image.gz 2>&1 | tee build.log

      # =========================================================
      # [8] UPLOAD BUILD LOG
      # =========================================================
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: error

      # =========================================================
      # [9] PACKAGE ANYKERNEL3
      # =========================================================
      - name: Package AnyKernel3
        run: |
          set -e

          if [ ! -f out/arch/arm64/boot/Image.gz ]; then
            echo "❌ FATAL ERROR: Image.gz tidak ditemukan! Kompilasi gagal."
            exit 1
          fi

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AK3
          cp out/arch/arm64/boot/Image.gz AK3/
          cd AK3

          cat > anykernel.sh << 'EOF'
          properties() { '
          kernel.string=Mutan-Kernel-A16-Extreme
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=peridot
          supported.versions=14 - 16
          '; }
          block=boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          no_magisk_check=1;
          . tools/ak3-core.sh;
          split_boot;
          if [ -f "split_img/ramdisk.cpio" ]; then
              unpack_ramdisk;
              write_boot;
          else
              flash_boot;
          fi
          EOF

          zip -r9 ../kernel-mutan.zip . -x '*.git*'
          echo "✅ Package selesai: kernel-mutan.zip"

      # =========================================================
      # [10] UPLOAD KERNEL
      # =========================================================
      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Mutan-Kernel-Release
          path: kernel-mutan.zip
          if-no-files-found: error

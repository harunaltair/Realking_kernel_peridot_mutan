name: Build Mutan Kernel A16 Extreme (Poco F6)

on:
  push:
    branches: [ main, master, android-16 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git git-lfs zip \
          libssl-dev libncurses5-dev libncursesw5-dev libelf-dev binutils-aarch64-linux-gnu pahole

      - name: Setup ZyCromerZ Clang (15.0.7-20260208)
        run: |
          mkdir clang
          cd clang
          # Link yang sudah dikoreksi sesuai instruksi kamu
          curl -LO https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          tar -xf *.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Build Mutan Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="lightbulb"
          export KBUILD_BUILD_HOST="Mutan-BuildServer"

          # FIX: Hapus referensi KernelSU yang bikin error
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          
          # 1. Initialize Defconfig
          make O=out vendor/peridot_defconfig
          
          # 2. Extreme Optimizer & Compatibility (EROFS, BBG, Wild Patches)
          scripts/config --objtree out --enable CONFIG_EROFS_FS
          scripts/config --objtree out --enable CONFIG_EROFS_FS_ZIP
          scripts/config --objtree out --enable CONFIG_EROFS_FS_XATTR
          scripts/config --objtree out --enable CONFIG_TMPFS_XATTR
          scripts/config --objtree out --enable CONFIG_OVERLAY_FS
          scripts/config --objtree out --enable CONFIG_ZRAM
          scripts/config --objtree out --enable CONFIG_ZSMALLOC
          scripts/config --objtree out --enable CONFIG_PSI
          scripts/config --objtree out --enable CONFIG_MEMCG
          scripts/config --objtree out --set-val CONFIG_HZ 300
          scripts/config --objtree out --enable CONFIG_SCHED_AUTOGROUP
          scripts/config --objtree out --enable CONFIG_TCP_CONG_BBR
          scripts/config --objtree out --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          scripts/config --objtree out --enable CONFIG_NET_SCH_FQ_CODEL
          scripts/config --objtree out --enable CONFIG_WIREGUARD
          scripts/config --objtree out --disable CONFIG_KASAN
          scripts/config --objtree out --disable CONFIG_UBSAN
          scripts/config --objtree out --disable CONFIG_KCSAN
          
          # 3. Inject Version Info
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-Mutan-Extreme-1.0.0"/g' out/.config
          
          # 4. Final Compilation
          make -j$(nproc --all) O=out \
              CC=clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-android- \
              LLVM=1 \
              LLVM_IAS=1 \
              KCFLAGS="-O3 -march=armv9.2-a+crypto+dotprod -pipe"

      - name: Package with Safety Fallback
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git -b master
          cd AnyKernel3
          
          cat << 'EOF' > anykernel.sh
          properties() { '
          kernel.string=Mutan-Kernel-A16-Extreme (Poco F6 / Peridot)
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=peridot
          supported.versions=14 - 16
          '; }
          block=boot
          is_slot_device=auto
          . tools/ak3-core.sh
          ui_print "- Backup kernel lama ke /sdcard/Mutan_Original_Backup.img"
          dump_boot; 
          cp $split_img/boot.img /sdcard/Mutan_Original_Backup.img || ui_print "! Gagal buat backup"
          split_boot;
          flash_boot;
          EOF
          
          cp ../out/arch/arm64/boot/Image .
          find ../out/arch/arm64/boot/dts/vendor/xiaomi/ -name "*.dtb" -exec cp {} . \;
          if [ -f "../out/arch/arm64/boot/dtbo.img" ]; then
              cp ../out/arch/arm64/boot/dtbo.img .
          fi
          
          zip -r9 ../Mutan-Kernel-$(date +%Y%m%d-%H%M).zip *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v1.0.0-$(date +%Y%m%d-%H%M)
          name: Mutan-Kernel-A16-Extreme (Poco F6)
          body: |
            **Mutan-Kernel-A16-Extreme for Peridot**
            - Compiler: ZyCromerZ Clang 15.0.7
            - Optimizer: BBG, EROFS, Wild Patches
            - Fallback: /sdcard/Mutan_Original_Backup.img
          files: "*.zip"

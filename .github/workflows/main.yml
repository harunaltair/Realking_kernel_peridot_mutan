name: Mutan Kernel Auto Pipeline (Peridot)

on:
  push:
    branches: [ main ]
    paths:
      - 'arch/**'
      - 'drivers/**'
      - 'include/**'
      - 'kernel/**'
      - 'my_tweaks.config'
      - 'hyperos_defconfig'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git curl zip \
          libssl-dev libncurses-dev libelf-dev pahole ccache

      - name: Setup Clang 20
        run: |
          mkdir clang && cd clang
          curl -LO https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250129-release/Clang-20.0.0git-20250129.tar.gz
          tar -xf *.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Setup ccache
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV

      - name: Prepare Config (AUTO MERGE)
        run: |
          # =========================
          # CLEAN TOTAL
          # =========================
          git clean -fdx || true
          git checkout -- drivers/Kconfig drivers/Makefile || true
          rm -rf out drivers/kernelsu || true

          export ARCH=arm64
          export SUBARCH=arm64

          make mrproper
          mkdir -p out

          make O=out peridot_defconfig

          scripts/kconfig/merge_config.sh -m out/.config hyperos_defconfig
          scripts/kconfig/merge_config.sh -m out/.config my_tweaks.config

          make O=out olddefconfig

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Mutan"
          export KBUILD_BUILD_HOST="AutoPipeline"
          export CC="ccache clang"

          make -j$(nproc --all) O=out \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            KCFLAGS="-O2 -pipe"

      - name: Package AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3

          sed -i 's/kernel.string=.*/kernel.string=Mutan Kernel Auto (Peridot)/g' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=peridot/g' anykernel.sh

          cp ../out/arch/arm64/boot/Image.gz .
          cp ../out/arch/arm64/boot/dtbo.img .
          find ../out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} . \;

          zip -r9 ../MutanKernel-$(date +%Y%m%d-%H%M).zip *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-$(date +%Y%m%d-%H%M)
          name: Mutan Kernel Auto Build
          body: |
            ✅ Auto Merge HyperOS Config
            ✅ Auto Inject Tweaks
            ✅ Balanced Performance Kernel
          files: "*.zip"

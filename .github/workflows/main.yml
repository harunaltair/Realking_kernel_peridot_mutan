name: Build Poco F6 Mutan Kernels (Extreme Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Mutan Extreme Kernel
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # [1] CHECKOUT KERNEL SOURCE (BYPASS BROKEN SUBMODULES)
      # =========================================================
      - name: Checkout Mutan Source
        uses: actions/checkout@v4
        with:
          repository: 'harunaltair/Realking_kernel_peridot_mutan'
          ref: 'main'
          fetch-depth: 1
          # Submodules sengaja tidak diaktifkan untuk mencegah error 128

      # =========================================================
      # [2] CACHE TOOLCHAIN
      # =========================================================
      - name: Cache Toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: clang-15.0.7-20260208

      # =========================================================
      # [3] INSTALL BUILD DEPENDENCIES
      # =========================================================
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential flex git-core gnupg gperf \
            libssl-dev libxml2-utils lzop python3 python-is-python3 \
            zip zlib1g-dev llvm clang lld libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      # =========================================================
      # [4] SETUP TOOLCHAIN
      # =========================================================
      - name: Setup Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain && cd toolchain
          curl -L --retry 3 --retry-delay 5 \
            -o clang.tar.gz \
            "https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz"
          tar -xf clang.tar.gz
          rm -f clang.tar.gz

      - name: Verify Toolchain
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          echo "=== Clang Version ==="
          clang --version || { echo "❌ clang tidak ditemukan!"; exit 1; }
          echo "=== LLD Version ==="
          ld.lld --version || { echo "❌ ld.lld tidak ditemukan!"; exit 1; }
          echo "=== Cross GCC ==="
          aarch64-linux-gnu-gcc --version || { echo "❌ aarch64 gcc tidak ditemukan!"; exit 1; }
          echo "✅ Toolchain OK"

      - name: Add Toolchain to PATH
        run: echo "$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_PATH

      # =========================================================
      # [5] SETUP KERNELSU NEXT (RESILIENT MANUAL CLONE)
      # =========================================================
      - name: Setup KernelSU Next
        run: |
          set -e
          echo "Membersihkan jejak submodule KSU yang rusak..."
          
          # Hapus sisa folder di root atau di drivers agar clone tidak bentrok
          rm -rf KernelSU-Next drivers/kernelsu drivers/kernelsu-next
          
          echo "Mengunduh KernelSU-Next secara manual ke lokasi yang tepat..."
          # Pastikan clone langsung ke folder 'drivers/kernelsu'
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next drivers/kernelsu
          
          # Rapikan struktur folder jika KSU memiliki subfolder 'kernel'
          if [ -d "drivers/kernelsu/kernel" ]; then
            mv drivers/kernelsu/kernel/* drivers/kernelsu/
            rm -rf drivers/kernelsu/kernel
          fi
          
          echo "✅ KernelSU Next siap digunakan."

      # =========================================================
      # [6] MUTAN EXTREME CONFIGURATION
      # =========================================================
      - name: Kernel Config Setup
        run: |
          set -e

          CONF="arch/arm64/configs/vendor/peridot_defconfig"
          [ ! -f "$CONF" ] && CONF="arch/arm64/configs/peridot_defconfig"
          [ ! -f "$CONF" ] && CONF=$(find arch/arm64/configs/ -name "*peridot*" | head -n 1)
          
          echo "TARGET_DEFCONFIG=$(basename $CONF)" >> $GITHUB_ENV
          DEFCONFIG="$CONF"
          echo "✅ Menggunakan defconfig: $DEFCONFIG"

          set_config() {
            sed -i "/^$1[= ]/d" "$DEFCONFIG" || true
            sed -i "/^# $1 is not set/d" "$DEFCONFIG" || true
            echo "$1=$2" >> "$DEFCONFIG"
          }

          echo "=== Applying Mutan Extreme Optimizations ==="

          # [A] COMPILATION & EXTREME OPTIMIZATION
          sed -i 's/CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y/CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y/g' "$DEFCONFIG" || true
          set_config CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3 y
          set_config CONFIG_FRAME_WARN 4096
          set_config CONFIG_WERROR n
          set_config CONFIG_LTO_CLANG_THIN y
          set_config CONFIG_HZ_300 y
          
          # Disable Heavy Tracing
          set_config CONFIG_FTRACE n
          set_config CONFIG_FUNCTION_TRACER n
          set_config CONFIG_TRACING y
          set_config CONFIG_TRACE_CLOCK y

          # [B] ROOT ACCESS
          set_config CONFIG_KSU y
          set_config CONFIG_KSU_NEXT y
          set_config CONFIG_OVERLAY_FS y
          set_config CONFIG_OVERLAY_FS_REDIRECT_DIR y
          set_config CONFIG_OVERLAY_FS_INDEX y

          # [C] SCHEDULER: EAS & SCHEDUTIL
          set_config CONFIG_CPU_FREQ_GOV_SCHEDUTIL y
          set_config CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL y
          set_config CONFIG_CPU_IDLE_GOV_TEO y
          set_config CONFIG_ENERGY_MODEL y
          set_config CONFIG_UCLAMP_TASK y
          set_config CONFIG_UCLAMP_TASK_GROUP y

          # [D] MEMORY MANAGEMENT (LMKD Android 16 Ready)
          set_config CONFIG_PSI y
          set_config CONFIG_MEMCG y
          set_config CONFIG_MEMCG_SWAP y
          set_config CONFIG_MEMCG_KMEM y
          set_config CONFIG_CGROUP_CPUACCT y
          set_config CONFIG_ZRAM y
          set_config CONFIG_ZSMALLOC y
          set_config CONFIG_ZSWAP y
          set_config CONFIG_ZRAM_DEF_COMP_LZ4 y
          set_config CONFIG_TRANSPARENT_HUGEPAGE y
          set_config CONFIG_TRANSPARENT_HUGEPAGE_MADVISE y

          # [E] I/O SCH
